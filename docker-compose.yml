services:
  db:
    image: postgres:17-alpine
    container_name: spl-stats-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-splstats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-splstats}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-splstats}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: spl-stats-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
  #   ports:
  #     - "8088:80"

  migrate:
    # Runs DB migrations once before app and worker start. Exits 0 on success.
    image: gamerbeaker/spl-stats-next:latest
    container_name: spl-stats-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-splstats}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-splstats}?schema=public
    entrypoint: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  app:
    # To pin a specific release replace 'latest' with a version tag, e.g. gamerbeaker/spl-stats-next:v0.1.0
    image: gamerbeaker/spl-stats-next:latest
    container_name: spl-stats-app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-splstats}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-splstats}?schema=public
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      COOKIE_SECRET: ${COOKIE_SECRET}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      LOG_DB: ${LOG_DB:-true}
      SPL_USER_AGENT: ${SPL_USER_AGENT:-}
    ports:
      - "3000:3000"

  worker:
    # To pin a specific release replace 'latest' with a version tag, e.g. gamerbeaker/spl-stats-next:v0.1.0
    image: gamerbeaker/spl-stats-next:latest
    container_name: spl-stats-worker
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-splstats}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-splstats}?schema=public
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_DB: ${LOG_DB:-true}
      BATTLE_SYNC_ACCOUNTS: ${BATTLE_SYNC_ACCOUNTS:-}
      SPL_USER_AGENT: ${SPL_USER_AGENT:-}
    entrypoint: ["./docker-entrypoint-worker.sh"]
    restart: unless-stopped

volumes:
  postgres_data:
