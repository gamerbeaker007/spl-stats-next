version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: spl-stats-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-splstats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-splstats}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splstats"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spl-stats-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-splstats}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-splstats}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GITHUB_ID: ${GITHUB_ID}
      GITHUB_SECRET: ${GITHUB_SECRET}
      GITHUB_ALLOWED_USERS: ${GITHUB_ALLOWED_USERS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
